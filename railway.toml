# railway.toml
[build]
builder = "nixpacks"
buildCommand = "npm install && npm run db:generate && npm run build"

[deploy]
startCommand = "npm run db:push || true && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "moodkit-api"

[services.variables]
NODE_ENV = "production"
PORT = "3000"
