function calDayFromStr(s){
  if(!s)return 0;
  // ISO date "2026-04-15" → 15
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return parseInt(iso[3]);
  // Turkish "15 Nisan" → 15
  const m=s.match(/^(\d+)/);
  return m?parseInt(m[1]):0;
}

async function openCal(fid,bid){
  curFid=fid;curBid=bid;openAcc(fid);lastView='cal';
  const f=gF(fid);if(!f)return;
  if(!f.briefs?.length)await loadBriefs(fid);
  let b=gB(fid,bid);
  if(!b&&f.briefs?.length){bid=f.briefs[0].id;curBid=bid;b=f.briefs[0];}
  if(!b)return;
  await loadIGCells(fid,bid);
  b=gB(fid,bid);
  setBC([{label:'Dashboard',fn:'goHome()'},{label:f.name},{label:`${b.month} ${b.year}`},{label:'Takvim'}]);

  const todayDate=new Date();
  const isCurrentMonth=(todayDate.getFullYear()===b.year&&todayDate.getMonth()===MONTHS.indexOf(b.month));
  const today=isCurrentMonth?todayDate.getDate():0;

  const monthIdx=MONTHS.indexOf(b.month);
  const firstDow=new Date(b.year,monthIdx,1).getDay();
  // Convert Sunday=0 to Monday=0 for Turkish week (Pzt start)
  const offset=(firstDow===0?6:firstDow-1);
  const daysInMonth=new Date(b.year,monthIdx+1,0).getDate();

  // Build day → events map
  const byDay={};
  b.igCells.filter(c=>c.date).forEach(p=>{
    const d=calDayFromStr(p.date);
    if(d>0){if(!byDay[d])byDay[d]={posts:[],tasks:[]};byDay[d].posts.push(p);}
  });
  (b.tasks||[]).filter(t=>t.deadline).forEach(t=>{
    const d=calDayFromStr(t.deadline);
    if(d>0){if(!byDay[d])byDay[d]={posts:[],tasks:[]};byDay[d].tasks.push(t);}
  });

  const posts=b.igCells.filter(c=>c.date);
  document.getElementById('v-cal').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:16px;font-weight:600">${f.name} — ${b.month} ${b.year}</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:3px">${posts.length} planlı gönderi · ${(b.tasks||[]).filter(t=>t.deadline).length} görev son tarihi</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(d=>`<div style="text-align:center;font-size:10px;color:var(--txt3);padding:4px;font-weight:500">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
      ${Array.from({length:offset},()=>`<div></div>`).join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const day=i+1;const ev=byDay[day]||{posts:[],tasks:[]};
        const isToday=day===today;const isPast=day<today&&today>0;
        return `<div style="border:.5px solid ${isToday?'var(--acc)':'var(--bdr)'};border-radius:8px;min-height:72px;padding:5px;background:${isToday?'var(--abg)':isPast?'var(--bg2)':'var(--bg)'}">
          <div style="font-size:10px;font-weight:500;color:var(--txt2);margin-bottom:3px">${day}</div>
          ${ev.posts.map(p=>`<div style="font-size:8px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:${f.color||'#534AB7'}22;color:${f.color||'#534AB7'}" onclick="openIG('${fid}','${bid}')">${p.type==='reels'?'▶':p.type==='carousel'?'⧉':'○'} ${p.cap?.slice(0,12)||'—'}</div>`).join('')}
          ${ev.tasks.map(t=>`<div style="font-size:8px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:${TASK_COLORS[t.type]||'#534AB7'}22;color:${TASK_COLORS[t.type]||'#534AB7'}" onclick="openTasks('${fid}','${bid}')">⏰ ${t.desc?.slice(0,12)||t.cardRef||'—'}</div>`).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="card cp">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px">Planlı Gönderiler</div>
      ${posts.sort((a,c)=>calDayFromStr(a.date)-calDayFromStr(c.date)).map(p=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bdr)">
          <div style="width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;background:${f.color||'#534AB7'}22;position:relative">
            ${p.src?`<img src="${p.src}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" loading="lazy">`:''}
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
              <span class="badge ${p.type==='reels'?'brd':p.type==='carousel'?'bpu':'bgn'}" style="font-size:9px">${p.type==='reels'?'Reels':p.type==='carousel'?'Carousel':'Post'}</span>
              <span style="font-size:10px;color:var(--txt3)">${p.date}</span>
            </div>
            <div style="font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.cap||'—'}</div>
          </div>
          <div>${p.approved===true?'<span style="color:var(--grn);font-size:12px">✓</span>':'<span style="color:var(--txt3);font-size:12px">○</span>'}</div>
        </div>`).join('')}
      ${!posts.length?'<div style="text-align:center;padding:16px;font-size:12px;color:var(--txt3)">Planlı gönderi yok.</div>':''}
    </div>`;
  showV('cal');
}

async function toggleCheckPersonel(fid,bid,tid,cid,done,el){
  const t=_myTasksData.find(x=>x.id===tid);
  const ci=t?.checkItems?.find(x=>x.id===cid);
  if(ci)ci.done=done;
  const span=el?.parentElement?.querySelector('span');
  if(span)span.style.cssText=`font-size:12px;color:${done?'var(--txt3)':'var(--txt2)'};${done?'text-decoration:line-through':''}`;
  try{await apiFetch(`/api/firms/${fid}/briefs/${bid}/tasks/${tid}/check/${cid}`,{method:'PATCH',body:{done}});}
  catch(e){if(ci)ci.done=!done;toast('Hata: '+e.message);}
}

async function addCheckItemPersonel(fid,bid,tid,btn){
  const text=prompt('Madde metni:');if(!text?.trim())return;
  try{
    const ci=await apiFetch(`/api/firms/${fid}/briefs/${bid}/tasks/${tid}/check`,{method:'POST',body:{text:text.trim()}});
    const t=_myTasksData.find(x=>x.id===tid);
    if(t){if(!t.checkItems)t.checkItems=[];t.checkItems.push({id:ci.id,text:ci.text,done:false,order:ci.order});}
    renderPersonelPanel();
  }catch(e){toast('Hata: '+e.message);}
}

function closeMod(){
  if(lastView==='brief'&&curFid&&curBid)openBrief(curFid,curBid);
  else if(lastView==='mb-ig'&&curFid&&curBid)openMbIG(curFid,curBid);
  else if(lastView==='mb-k'&&curFid&&curBid)openMbK(curFid,curBid);
  else if(lastView==='tasks'&&curFid&&curBid)openTasks(curFid,curBid);
  else if(lastView==='ig'&&curFid&&curBid)openIG(curFid,curBid);
  else if(lastView==='yayin'&&curFid&&curBid)openYayin(curFid,curBid);
  else if(lastView==='cal'&&curFid&&curBid)openCal(curFid,curBid);
  else if(curFid&&curBid)openBrief(curFid,curBid);
  else goHome();
}

// ── TARİH YARDIMCILARı ───────────────────────────────────
function todayStr(){return new Date().toISOString().split('T')[0];}
function nowStr(){return new Date().toISOString().slice(0,16);}

// ── LİNK ÖNİZLEME SİSTEMİ ───────────────────────────────
let _previewTimer=null;
const PLAT_COLORS={YouTube:'#ff0000',Vimeo:'#1AB7EA',TikTok:'#010101',Instagram:'#E1306C',Pinterest:'#E60023',Behance:'#1769FF',Web:'#534AB7'};

function onUrlInputChange(inp,previewContainerId){
  clearTimeout(_previewTimer);
  const url=inp.value.trim();
  const cont=document.getElementById(previewContainerId);
  if(!cont)return;
  if(!url||!url.startsWith('http')){cont.innerHTML='';return;}
  // Anlık embed hint
  const p=getLinkPlatform(url);
  if(p){
    const hintColor=p.embed===false?'var(--amb)':p.embed?'var(--grn)':'var(--txt3)';
    const hintMsg=p.embed===false?`⚠ ${p.name} embed desteklenmiyor — görsel yükleyin.`:`✓ ${p.name} ${p.embed===true?'embed':'player'} destekleniyor.`;
    cont.innerHTML=`<div style="font-size:10px;color:${hintColor};margin-top:4px">${hintMsg}</div>`;
  }else{
    cont.innerHTML=`<div style="font-size:10px;color:var(--txt3);margin-top:4px">Önizleme yükleniyor...</div>`;
  }
  _previewTimer=setTimeout(async()=>{
    try{
      const data=await apiFetch('/api/link-preview?url='+encodeURIComponent(url));
      renderLinkPreview(previewContainerId,data,url);
    }catch(e){
      if(cont)cont.innerHTML=`<div style="font-size:10px;color:var(--amb);margin-top:4px">Önizleme alınamadı. Manuel görsel yükleyebilirsiniz.</div>`;
    }
  },600);
}

function renderLinkPreview(containerId,data,url){
  const el=document.getElementById(containerId);if(!el)return;
  const platColor=PLAT_COLORS[data.platform]||'#534AB7';
  // YouTube thumbnail'i otomatik doldur
  if(data.thumbnail){
    if(!window._mbc)window._mbc={};
    if(!window._mbc.img&&!window._mbc.url){
      window._mbc.autoThumb=data.thumbnail;
      const fp=document.getElementById('mbc-fp');

window._slides=[];

function onNicTypeChange(val){
  const cs=document.getElementById('carousel-section');
  const vs=document.getElementById('nic-v-section');
  if(cs)cs.style.display=val==='carousel'?'block':'none';
  if(vs)vs.style.display=val==='reels'?'block':'none';
  if(val==='carousel')renderCarouselSlides();
}

function renderCarouselSlides(){
  const container=document.getElementById('carousel-slides');
  if(!container)return;
  container.innerHTML=window._slides.map((s,i)=>
    `<div style="position:relative;width:62px;height:62px;flex-shrink:0">
      <img src="${s}" style="width:62px;height:62px;object-fit:cover;border-radius:6px;border:.5px solid var(--bdr2)">
      <button onclick="removeCarouselSlide(${i})" style="position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;z-index:1">✕</button>
    </div>`
  ).join('');
  const addBtn=document.getElementById('carousel-add-btn');
  const countEl=document.getElementById('carousel-count');
  if(addBtn)addBtn.style.display=window._slides.length>=20?'none':'inline-flex';
  if(countEl)countEl.textContent=`${window._slides.length}/20`;
}

function removeCarouselSlide(i){
  window._slides.splice(i,1);
  renderCarouselSlides();
}

async function addCarouselSlide(){
  if(window._slides.length>=20){toast('Maksimum 20 slayt eklenebilir');return;}
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    const localUrl=URL.createObjectURL(f);
    const idx=window._slides.length;
    window._slides.push(localUrl);
    renderCarouselSlides();
    try{
      const fd=new FormData();fd.append('file',f);
      const res=await fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+_token},body:fd});
      if(res.ok){const d=await res.json();window._slides[idx]=d.url;renderCarouselSlides();}
    }catch(err){toast('Yükleme hatası: '+err.message);}
  };
  input.click();
}

function renderUploadArea(keyName,fpId,accept='image/*,video/*'){
  return `<div class="upload-area" id="${fpId}-wrap"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="handleDrop(event,'${fpId}','${keyName}')"
    onclick="document.getElementById('${fpId}-inp').click()">
    <input type="file" id="${fpId}-inp" accept="${accept}" multiple style="display:none" onchange="handleFileSelect(this,'${fpId}','${keyName}')">
    <div id="${fpId}-empty">
      <div style="font-size:20px;opacity:.3;margin-bottom:4px">📁</div>
      <div style="font-size:12px;font-weight:500;color:var(--txt2)">Dosyayı sürükle veya tıkla</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:2px">JPG, PNG, GIF, MP4, MOV — maks 50MB</div>
    </div>
    <div id="${fpId}-preview" style="display:none"></div>
    <div id="${fpId}-progress" style="display:none">
      <div class="upload-prog-bar"><div class="upload-prog-fill" id="${fpId}-fill" style="width:0%"></div></div>
      <div style="font-size:10px;color:var(--txt3);margin-top:4px" id="${fpId}-pct">Yükleniyor...</div>
    </div>
  </div>`;
}

function handleDrop(e,fpId,keyName){
  e.preventDefault();
  const wrap=document.getElementById(fpId+'-wrap');if(wrap)wrap.classList.remove('drag-over');
  processFiles(Array.from(e.dataTransfer.files),fpId,keyName);
}
function handleFileSelect(input,fpId,keyName){
  processFiles(Array.from(input.files),fpId,keyName);
  input.value='';
}
const MAX_FILE_MB=50;
let _uploading=0; // Aktif yükleme sayacı — 0 ise hazır
function processFiles(files,fpId,keyName){
  if(!files.length)return;
  const isCarouselMode=document.getElementById('nic-t')?.value==='carousel'||document.getElementById('mbc-type')?.value==='Carousel';
  if(isCarouselMode&&files.length>1){processCarouselFilesNew(files,fpId,keyName);return;}
  const file=files[0];
  if(file.size>MAX_FILE_MB*1024*1024){toast(`Dosya çok büyük (maks ${MAX_FILE_MB}MB)`,'error');return;}
  const url=URL.createObjectURL(file);
  const isVid=isVidFile(file);
  window[keyName]={img:isVid?null:url,blob:isVid?url:null,isVid,url:'',file};
  showUploadPreview(fpId,url,isVid,file);
  uploadFile(file,fpId,keyName);
}
function showUploadPreview(fpId,url,isVid,file){
  const empty=document.getElementById(fpId+'-empty');
  const preview=document.getElementById(fpId+'-preview');
  if(empty)empty.style.display='none';
  if(preview){
    preview.style.display='block';
    preview.innerHTML=isVid
      ?`<video src="${url}" style="max-height:140px;border-radius:8px;max-width:100%" controls muted playsinline></video>
         <div style="font-size:10px;color:var(--txt3);margin-top:4px">${file.name} · ${(file.size/1024/1024).toFixed(1)} MB</div>`
      :`<img src="${url}" style="max-height:140px;border-radius:8px;max-width:100%;object-fit:contain">
        <div style="font-size:10px;color:var(--txt3);margin-top:4px">${file.name} · ${(file.size/1024/1024).toFixed(1)} MB</div>`;
  }
}
async function uploadFile(file,fpId,keyName){
  const prog=document.getElementById(fpId+'-progress');
  const pct=document.getElementById(fpId+'-pct');
  const fill=document.getElementById(fpId+'-fill');
  if(prog)prog.style.display='block';
  _uploading++;
  try{
    const fd=new FormData();fd.append('file',file);
    const res=await fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+_token},body:fd});
    if(res.ok){
      const data=await res.json();
      if(window[keyName])window[keyName].url=data.url;
      // Blob URL'yi server URL ile güncelle (artık persist edebilir)
      if(window[keyName]&&window[keyName].img&&window[keyName].img.startsWith('blob:'))window[keyName].img=data.url;
      if(fill)fill.style.width='100%';
      if(pct)pct.textContent='✓ Yüklendi';
      setTimeout(()=>{if(prog)prog.style.display='none';},1500);
    }else{
      if(pct)pct.textContent='Yükleme başarısız';
      toast('Dosya yüklenemedi','error');
    }
  }catch(e){if(pct)pct.textContent='Yükleme hatası';toast('Yükleme hatası','error');console.warn('Upload hatası',e);}
  finally{_uploading=Math.max(0,_uploading-1);}
}
function processCarouselFilesNew(files,fpId,keyName){
  const CAROUSEL_MAX_MB=5;
  const valid=files.filter(f=>f.size<=CAROUSEL_MAX_MB*1024*1024);
  if(valid.length<files.length)toast(`${files.length-valid.length} dosya 5MB sınırını aştı, atlandı`,'warning');
  const limited=valid.slice(0,20);
  if(!limited.length){toast('Geçerli dosya bulunamadı','error');return;}
  const slides=limited.map(f=>({url:URL.createObjectURL(f),name:f.name,size:f.size,file:f}));
  window[keyName]={img:slides[0].url,slides:slides.map(s=>s.url),isCarousel:true,slideCount:slides.length,_slideFiles:slides.map(s=>s.file)};
  const preview=document.getElementById(fpId+'-preview');
  const empty=document.getElementById(fpId+'-empty');
  if(empty)empty.style.display='none';
  if(preview){
    preview.style.display='block';
    preview.innerHTML=`<div style="font-size:11px;font-weight:500;color:var(--txt);margin-bottom:8px">${slides.length} fotoğraf seçildi${files.length>20?' (maks 20)':''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${slides.map((s,i)=>`<div style="position:relative">
          <img src="${s.url}" loading="lazy" style="width:56px;height:56px;object-fit:cover;border-radius:6px;border:.5px solid var(--bdr)">
          <div style="position:absolute;top:2px;right:2px;width:15px;height:15px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:7px;display:flex;align-items:center;justify-content:center">${i+1}</div>
        </div>`).join('')}
      </div>`;
  }
  // Upload all files
  slides.forEach(async(s,i)=>{
    try{
      const fd=new FormData();fd.append('file',s.file);
      const res=await fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+_token},body:fd});
      if(res.ok){const d=await res.json();if(window[keyName]?.slides)window[keyName].slides[i]=d.url;}
    }catch(e){}
  });
}

async function prevFile(fpId,input,key){
  if(!input.files||!input.files[0])return;
  const f=input.files[0];
  if(f.size>MAX_FILE_MB*1024*1024){toast(`Dosya çok büyük (maks ${MAX_FILE_MB}MB)`,'error');input.value='';return;}
  const localUrl=URL.createObjectURL(f);const isV=isVidFile(f);
  // img'i null bırak — upload bitince server URL atanacak (blob URL persist etmez)
  window[key]={img:null,blob:isV?localUrl:null,isVid:isV,url:''};
  document.getElementById(fpId).innerHTML=isV?
    `<video src="${localUrl}" style="height:60px;border-radius:5px" muted></video><div style="font-size:9px;color:var(--acc);margin-top:3px">Video → Reels · Yükleniyor...</div>`:
    `<img src="${localUrl}" style="height:60px;border-radius:5px;object-fit:cover">`;
  input.value='';
  _uploading++;
  try{
    const fd=new FormData();fd.append('file',f);
    const res=await fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+_token},body:fd});
    if(res.ok){
      const data=await res.json();
      if(window[key]){window[key].url=data.url;window[key].img=data.url;}
      if(isV){const el=document.getElementById(fpId);if(el){const dv=el.querySelector('div');if(dv)dv.textContent='Video → Reels ✓';}}
    }else{toast('Dosya yüklenemedi','error');}
  }catch(e){toast('Yükleme hatası','error');console.warn('Upload hatası',e);}
  finally{_uploading=Math.max(0,_uploading-1);}
}

  if(pw!==pw2){toast('Şifreler eşleşmiyor');return;}
  const role=document.getElementById('nm-r')?.value||'PROD';
  const title=document.getElementById('nm-t')?.value||'';
  const prodRole=document.getElementById('nm-pr')?.value||undefined;
  try{
    const body={name,email,password:pw,role,title};
    if(prodRole)body.prodRole=prodRole;
    const u=await apiFetch('/api/auth/register',{method:'POST',body});
    const uid=u.user?.id;
    const newM={id:uid||Date.now(),name,email,role:role.toLowerCase(),title,prodRole:prodRole||null};
    members.push(newM);
    sessionStorage.setItem('mk_members',JSON.stringify(members));
    // Seçili firmalara üye olarak ekle
    const selFirms=[...document.querySelectorAll('.nm-firm-cb:checked')].map(cb=>cb.value);
    for(const fid of selFirms){
      await apiFetch(`/api/firms/${fid}/members`,{method:'POST',body:{userId:uid}}).catch(e=>console.warn('Firma ataması başarısız:',e));
      const fw=firms.find(x=>x.id===fid);if(fw&&!fw.memberIds.includes(uid))fw.memberIds.push(uid);
    }
    toast('Üye eklendi ✓');showTeam();
  }catch(e){toast('Hata: '+e.message);}
}

async function updateMember(mid){
  const m=members.find(x=>x.id===mid);if(!m)return;
  const name=document.getElementById('em-n')?.value.trim()||m.name;
  const title=document.getElementById('em-t')?.value||m.title||'';
  const role=document.getElementById('em-r')?.value||m.role;
  const prodRole=document.getElementById('em-pr')?.value||undefined;
  const pw=document.getElementById('em-pw')?.value||'';
  const pw2=document.getElementById('em-pw2')?.value||'';
  if(pw&&pw!==pw2){toast('Şifreler eşleşmiyor');return;}
  if(pw&&pw.length<8){toast('Şifre en az 8 karakter');return;}
  try{
    const body={name,title,role:role.toUpperCase()};
    if(prodRole)body.prodRole=prodRole;
    await apiFetch(`/api/users/${mid}`,{method:'PUT',body});
    if(pw)await apiFetch(`/api/users/${mid}/password`,{method:'PATCH',body:{password:pw}}).catch(e=>console.warn(e));
    m.name=name;m.title=title;m.role=role.toLowerCase();m.prodRole=prodRole||null;
    // Firma erişimi güncelle
    const checked=[...document.querySelectorAll('.em-firm-cb:checked')].map(cb=>cb.value);
    const unchecked=[...document.querySelectorAll('.em-firm-cb:not(:checked)')].map(cb=>cb.value);
    for(const fid of checked){
      const fw=firms.find(x=>x.id===fid);
      if(fw&&!fw.memberIds?.includes(mid)){
        await apiFetch(`/api/firms/${fid}/members`,{method:'POST',body:{userId:mid}}).catch(e=>console.warn(e));
        if(!fw.memberIds)fw.memberIds=[];fw.memberIds.push(mid);
      }
    }
    for(const fid of unchecked){
      const fw=firms.find(x=>x.id===fid);
      if(fw&&fw.memberIds?.includes(mid)){
        await apiFetch(`/api/firms/${fid}/members/${mid}`,{method:'DELETE'}).catch(e=>console.warn(e));
        fw.memberIds=fw.memberIds.filter(x=>x!==mid);
      }
    }
    sessionStorage.setItem('mk_members',JSON.stringify(members));
    toast('Güncellendi ✓');showTeam();
  }catch(e){toast('Hata: '+e.message);}
}

async function deleteMember(mid){
  if(!confirm('Bu üyeyi silmek istediğinize emin misiniz?'))return;
  try{await apiFetch(`/api/users/${mid}`,{method:'DELETE'});}catch(e){console.warn(e);}
  members=members.filter(x=>x.id!==mid);
  sessionStorage.setItem('mk_members',JSON.stringify(members));
  toast('Üye silindi ✓');showTeam();
}

(async function(){
  if(_token&&_me){
    try{
      const me=await apiFetch('/api/auth/me');
      _me=me;localStorage.setItem('mk_me',JSON.stringify(_me));
      await initApp();
    }catch(e){
      localStorage.removeItem('mk_token');localStorage.removeItem('mk_me');
      _token='';_me=null;showLogin();
    }
  }else{showLogin();}
})();
